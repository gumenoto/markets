name: Mercati Screener

on:
  schedule:
    - cron: '*/30 7-22 * * 1-5'
    - cron: '0 0,1,2,3,4,5,6,23 * * *'
    - cron: '0 */2 * * 0,6'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install --quiet requests yfinance

      - name: Run screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener.py

      - name: Persist state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json docs/data.json
          git diff --staged --quiet || git commit -m "chore: update screener state [skip ci]"
          git push
